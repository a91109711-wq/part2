<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音圓查價平台</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            font-family: "Microsoft JhengHei", Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        h1 { 
            color: #fff; 
            margin-bottom: 30px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
            font-size: 1.8rem; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 20px; 
            font-size: 1.2rem; 
            text-align: center; 
            text-decoration: none; 
            color: white; 
            border-radius: 12px; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            transition: transform 0.2s; 
            box-sizing: border-box; 
        }
        .btn:active { 
            transform: scale(0.98); 
            box-shadow: 0 2px 3px rgba(0,0,0,0.3); 
        }
        .shopee { 
            background: linear-gradient(135deg, #ee4d2d, #ff7337); 
        }
        .video-btn { 
            background: linear-gradient(135deg, #27ae60, #2ecc71); 
            border: 2px solid #fff; 
            margin-top: 10px; 
        }
        .tag { 
            font-size: 0.8rem; 
            background: rgba(0,0,0,0.2); 
            padding: 3px 8px; 
            border-radius: 4px; 
            margin-left: 8px; 
            font-weight: normal; 
        }
    </style>
</head>
<body>

    <h1>🚀 音圓查價平台</h1>

    <div class="container">
        
        <a href="https://shopee.tw/search?keyword=音圓%20N2&sortBy=price" target="_blank" class="btn shopee">
            🦐 蝦皮查價 <span class="tag">N2系列 (價格排序)</span>
        </a>

        <a href="video.html" class="btn video-btn">
            📺 觀看教學影片
        </a>

    </div>

</body>
</html>
